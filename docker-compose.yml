services:
  backend:
    build: ./backend
    restart: always
    environment:
      - MONGODB_URL=mongodb://mongodb:27017
      - DATABASE_NAME=pingtree_db
      - REDIS_URL=redis://redis:6379
      - BASE_URL=${BASE_URL:-https://js.trustedagentforyou.com}
      - FRONTEND_URL=${FRONTEND_URL:-https://js.trustedagentforyou.com}
    depends_on:
      - mongodb
      - redis

  frontend:
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-https://js.trustedagentforyou.com/api/v1}
    restart: always
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-https://js.trustedagentforyou.com/api/v1}
    depends_on:
      - backend

  mongodb:
    image: mongo:latest
    restart: always
    volumes:
      - ./data/mongodb:/data/db

  redis:
    image: redis:alpine
    restart: always

  nginx:
    image: nginx:latest
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - frontend
      - backend

  certbot:
    image: certbot/certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    command: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

services:
  backend:
    build: ./backend
    restart: always
    environment:
      - MONGODB_URL=mongodb://mongodb:27017
      - DATABASE_NAME=pingtree_db
      - REDIS_URL=redis://redis:6379
    depends_on:
      - mongodb
      - redis

  frontend:
    build: ./frontend
    restart: always
    environment:
      - NEXT_PUBLIC_API_URL=https://js.trustedagentforyou.com/api/v1
    depends_on:
      - backend

  mongodb:
    image: mongo:latest
    restart: always
    volumes:
      - mongodb_data:/data/db

  redis:
    image: redis:alpine
    restart: always

  nginx:
    image: nginx:latest
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_etc:/etc/letsencrypt
      - certbot_var:/var/lib/letsencrypt
      - certbot_www:/var/www/certbot
    depends_on:
      - frontend
      - backend

  certbot:
    image: certbot/certbot
    volumes:
      - certbot_etc:/etc/letsencrypt
      - certbot_var:/var/lib/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  mongodb_data:
  certbot_etc:
  certbot_var:
  certbot_www:
